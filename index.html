<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header, footer { background: #1a1a1a; padding: 1rem 2rem; border: 1px solid #333; text-align: center; }
        header { border-bottom: 2px solid #4caf50; }
        footer { border-top: 1px solid #333; margin-top: auto; font-size: 0.8rem; color: #888; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        h1 { color: #fff; margin-bottom: 1rem; }
        .status-container { display: inline-flex; align-items: center; gap: 8px; padding: 0.5rem 1rem; background: #2e7d32; color: white; border-radius: 20px; font-size: 0.9rem; }
        .glow-dot { width: 8px; height: 8px; background-color: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <header>
        <h2>Owl Command Center</h2>
    </header>
    <main>
        <div class="card">
            <h1>Owl System Dashboard</h1>
            <p>Status: <span class="status-container"><span class="glow-dot"></span>Operational</span></p>
            <p>Agent: <strong>Owl</strong></p>
            <p>User: <strong>Boss</strong></p>
        </div>
    </main>
    <footer>
        &copy; 2026 Owl AI Agent | Built for the Boss
    </footer>
</body>
</html>
