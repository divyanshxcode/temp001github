<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl Dashboard</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --header-bg: #1a1a1a;
            --text: #e0e0e0;
            --heading: #fff;
            --border: #333;
        }
        .light-mode {
            --bg: #f5f5f5;
            --surface: #fff;
            --header-bg: #fff;
            --text: #333;
            --heading: #111;
            --border: #ddd;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; transition: background .3s, color .3s; }
        header, footer { background: var(--header-bg); padding: 1rem 2rem; border: 1px solid var(--border); text-align: center; transition: background .3s, border .3s; }
        header { border-bottom: 2px solid #4caf50; display: flex; justify-content: space-between; align-items: center; }
        footer { border-top: 1px solid var(--border); margin-top: auto; font-size: 0.8rem; color: #888; }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .card { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--border); transition: background .3s, border .3s; }
        h1 { color: var(--heading); margin-bottom: 1rem; transition: color .3s; }
        h2 { margin: 0; }
        .status-container { display: inline-flex; align-items: center; gap: 8px; padding: 0.5rem 1rem; background: #2e7d32; color: white; border-radius: 20px; font-size: 0.9rem; }
        .glow-dot { width: 8px; height: 8px; background-color: #00ff00; border-radius: 50%; box-shadow: 0 0 8px #00ff00; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .3s, border .3s; color: var(--text); }
        .theme-toggle:hover { background: rgba(255,255,255,.1); }
        header > div { display: flex; align-items: center; gap: 1rem; }
    </style>
</head>
<body>
    <header>
        <h2>Owl Command Center</h2>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    </header>
    <main>
        <div class="card">
            <h1>Owl System Dashboard</h1>
            <p>Status: <span class="status-container"><span class="glow-dot"></span>Operational</span></p>
            <p>Agent: <strong>Owl · GitMan</strong></p>
            <p>User: <strong>Boss</strong></p>
        </div>
    </main>
    <footer>
        &copy; 2026 Owl AI Agent | Built for the Boss
    </footer>
    <script>
        const toggle = document.getElementById('themeToggle');
        const icon = toggle;
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            icon.textContent = isLight ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
